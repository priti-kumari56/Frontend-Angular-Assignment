<body>

    <h2>Ingredients for Biryani</h2>
    <ul id="biryani">
        <li>Rice</li>
        <li>Chicken
            <ul>
                <li>Fried</li>
                <li>Grilled</li>
                <li>Roasted</li>
            </ul>
        </li>
        <li>Paneer</li>
    </ul>

    <h2>Fighter Jet</h2>
    <ul id="fighter">
        <li>Spices</li>
        <li>Gas/Electric</li>
    </ul>

    <h2>Ingredients for Lassi</h2>
    <ul id="lassi">
        <li>Curd</li>
        <li>Water</li>
        <li>Sugar
            <ul>
                <li>White Sugar</li>
                <li>Brown Sugar</li>
            </ul>
        </li>
        <li>Malai</li>
        <li>Kova</li>
    </ul>

</body>
