<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #162447;
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        table {
            background-color: #1f3151;
            border-collapse: collapse;
            width: 700px;
        }

        td {
            padding: 20px;
            vertical-align: middle;
        }

        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid red;
            background-color: #1f3151;
        }

        audio {
            width: 450px;
        }
    </style>
</head>
<body>

    <header>Music App</header>

    <div class="container">
        <table>
            <tr>
                <td><div class="circle"></div></td>
                <td>
                    <audio controls>
                        <source src="https://cdn.pixabay.com/audio/2023/10/30/audio_9fb43a8db7.mp3" type="audio/mpeg">
                    </audio>
                </td>
            </tr>
            <tr>
                <td><div class="circle"></div></td>
                <td>
                    <audio controls>
                        <source src="https://cdn.pixabay.com/audio/2023/11/17/audio_8329c3b90b.mp3" type="audio/mpeg">
                    </audio>
                </td>
            </tr>
            <tr>
                <td><div class="circle"></div></td>
                <td>
                    <audio controls>
                        <source src="https://cdn.pixabay.com/audio/2022/10/30/audio_0f8d3c3d0c.mp3" type="audio/mpeg">
                    </audio>
                </td>
            </tr>
            <tr>
                <td><div class="circle"></div></td>
                <td>
                    <audio controls>
                        <source src="https://cdn.pixabay.com/audio/2023/09/22/audio_f2ef5e5f93.mp3" type="audio/mpeg">
                    </audio>
                </td>
            </tr>
        </table>
    </div>

</body>
</html>
