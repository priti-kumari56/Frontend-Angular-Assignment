<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Form</title>
    <link rel="stylesheet" href="Personalnfo_Task16.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container">
        <aside class="sidebar">
            <div class="step active">
                <div class="circle">1</div>
                <div class="step-text">
                    <span>STEP 1</span>
                    <p>YOUR INFO</p>
                </div>
            </div>
            <div class="step">
                <div class="circle">2</div>
                <div class="step-text">
                    <span>STEP 2</span>
                    <p>SELECT PLAN</p>
                </div>
            </div>
            <div class="step">
                <div class="circle">3</div>
                <div class="step-text">
                    <span>STEP 3</span>
                    <p>ADD-ONS</p>
                </div>
            </div>
            <div class="step">
                <div class="circle">4</div>
                <div class="step-text">
                    <span>STEP 4</span>
                    <p>SUMMARY</p>
                </div>
            </div>
        </aside>

        <section class="form-container">
            <header>
                <h1>Personal info</h1>
                <p>Please provide your name, email address, and phone number.</p>
            </header>

            <form>
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="e.g. Stephen King">
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="e.g. stephenking@lorem.com">
                </div>
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="e.g. +1 234 567 890">
                </div>

                <div class="footer">
                    <button type="submit" class="next-btn">Next Step</button>
                </div>
            </form>
        </section>
    </main>

</body>
</html>
