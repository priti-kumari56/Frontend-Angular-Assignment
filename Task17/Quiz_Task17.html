<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Quiz App</title>
    <link rel="stylesheet" href="Quiz_Task17.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-decor"></div>

    <header class="top-nav">
        <div class="theme-toggle">
            <img src="icon-sun-light.svg" alt="sun" class="sun-icon">
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider round"></span>
            </label>
            <img src="icon-moon-light.svg" alt="moon" class="moon-icon">
        </div>
    </header>

    <main class="container">
        <section class="intro">
            <h1>Welcome to the <br><strong>Frontend Quiz!</strong></h1>
            <p>Pick a subject to get started.</p>
        </section>

        <section class="options">
            <button class="option-btn">
                <div class="icon-box html-bg"><img src="icon-html.svg" alt=""></div>
                <span>HTML</span>
            </button>

            <button class="option-btn">
                <div class="icon-box css-bg"><img src="icon-css.svg" alt=""></div>
                <span>CSS</span>
            </button>

            <button class="option-btn">
                <div class="icon-box js-bg"><img src="icon-js.svg" alt=""></div>
                <span>Javascript</span>
            </button>

            <button class="option-btn">
                <div class="icon-box access-bg"><img src="icon-accessibility.svg" alt=""></div>
                <span>Accessibility</span>
            </button>
        </section>
    </main>

</body>
</html>
