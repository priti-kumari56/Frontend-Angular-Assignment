<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us Form</title>
    <link rel="stylesheet" href="ContactUs_Task18.css">
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="form-card">
        <h1>Contact Us</h1>

        <form>
            <div class="grid-row">
                <div class="input-group">
                    <label for="first-name">First Name <span class="asterisk">*</span></label>
                    <input type="text" id="first-name" required>
                </div>
                <div class="input-group">
                    <label for="last-name">Last Name <span class="asterisk">*</span></label>
                    <input type="text" id="last-name" required>
                </div>
            </div>

            <div class="input-group">
                <label for="email">Email Address <span class="asterisk">*</span></label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label>Query Type <span class="asterisk">*</span></label>
                <div class="grid-row radio-container">
                    <label class="radio-card">
                        <input type="radio" name="query" value="general" required>
                        <span>General Enquiry</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="query" value="support">
                        <span>Support Request</span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="message">Message <span class="asterisk">*</span></label>
                <textarea id="message" rows="5" required></textarea>
            </div>

            <div class="consent-group">
                <input type="checkbox" id="consent" required>
                <label for="consent">I consent to being contacted by the team <span class="asterisk">*</span></label>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </main>

</body>
</html>
