<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Applicant Form</title>
  </head>
  <body>
    <fieldset>
      <legend><h1>Applicant Details</h1></legend>
      <form action="" method="get">

        <label>First Name:</label>
        <input type="text" name="firstname" required><br><br>

        <label>Last Name:</label>
        <input type="text" name="lastname" required><br><br>

        <label>Email:</label>
        <input type="email" name="email" required ><br><br>

        <label>Gender:</label><br>
        Male <input type="radio" name="gender" value="Male"><br>
        female <input type="radio" name="gender" value="Female"><br><br>

        <label>Contact:</label>
        <input type="tel" name="contact"><br><br>

        <label>Qualification:</label>
        <input type="file" name="qualification"><br><br>

        <label>Joining Date</label>
        <input type="date" name="joiningdate"><br><br>

        <label>Skills</label>
        <input type="checkbox" name="skills" value="javascript"> JavaScript
        <input type="checkbox" name="skills" value="java"> Java<br><br>
        <input type="checkbox" name="skills" value="react"> React
        <input type="checkbox" name="skills" value="express"> Express<br><br>
        <input type="checkbox" name="skills" value="python"> Python
        <input type="checkbox" name="skills" value="sql"> SQL<br><br>

        <label>Year of Experience:</label>
        <input type="range" name="experience" min="0" max="20"><br><br>

        <label>Work Location</label>
        <select name="worklocation">
            <option value="">--Default--</option>
            <option value="delhi">Delhi</option>
            <option value="mumbai">Mumbai</option>
            <option value="bangalore">Bangalore</option>
        </select><br><br>

        <label>Address:</label>
        <textarea name="address" rows="2" cols="20"></textarea><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

      </form>
    </fieldset>
  </body>
</html>
